name: Build Flet Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # تم التعديل للإصدار الذي طلبه النظام في الخطأ
          flutter-version: '3.41.4' 
          cache: true

      - name: Install Dependencies
        run: |
          pip install flet flet-cli flet-flashlight flet-permission-handler

      - name: Build APK
        run: |
          # إضافة yes | تجعل النظام يوافق تلقائياً على أي سؤال يظهر أثناء البناء
          yes | flet build apk --module-name app
