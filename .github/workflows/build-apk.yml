name: Build Flet Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # حل تحذير Node.js
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # إصدار مستقر جداً مع Flet
          cache: true

      - name: Install Dependencies
        run: |
          pip install flet flet-cli flet-flashlight flet-permission-handler

      - name: Build APK
        run: |
          # بناء نظيف تماماً
          flet build apk --module-name app
