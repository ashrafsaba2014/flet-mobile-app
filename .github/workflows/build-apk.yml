name: Build Flet Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4' # تأكد أن هذا الإصدار متوافق مع نسخة Flet
          cache: true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-cli flet-flashlight flet-permission-handler

      # هذه الخطوة مهمة للتأكد من وجود مجلد assets قبل البناء
      - name: Check Assets Directory
        run: |
          if [ ! -d "assets" ]; then
            mkdir assets
            echo "Created empty assets directory"
          fi

      - name: Build APK
        run: |
          # استخدمنا --module-name app لأن ملفك اسمه app.py          
          flet build apk --module-name app --requirements requirements.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Flashlight-App-Release
          path: build/apk/*.apk
