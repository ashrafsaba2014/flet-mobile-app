name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # ✅ محدث لـ Node.js 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          cache: true

      - name: Install Flet
        run: pip install flet flet-cli

      # 🔍 خطوة تشخيصية: طباعة هيكل مجلد build لمعرفة مكان الـ APK الفعلي
      - name: Debug: List build directory
        run: |
          echo "🔍 Searching for APK..."
          find build -name "*.apk" -type f 2>/dev/null || echo "❌ No APK found"

      - name: Build APK
        run: flet build apk --module-name app

      # 🔍 خطوة ثانية بعد البناء: البحث عن الـ APK
      - name: Debug: Find APK after build
        run: |
          echo "🔍 Searching again after build..."
          find . -name "*.apk" -type f 2>/dev/null || echo "❌ Still no APK"

      # ✅ رفع الـ APK من المسار الصحيح (المسار القياسي لـ Flutter/Flet)
      - name: Upload APK
        uses: actions/upload-artifact@v4  # ✅ محدث لـ Node.js 24
        with:
          name: app-release
          path: |
            build/app/outputs/apk/release/app-release.apk
            build/apk/release/app-release.apk
          if-no-files-found: warn  # ⚠️ لا يفشل الـ Workflow إذا لم يُوجد الملف
