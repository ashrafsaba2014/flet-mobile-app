name: Build Flet Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'              

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # تثبيت فليت الأساسي
          pip install flet==0.21.2
          # تثبيت الإضافات وتجاهل فحص الاعتماديات لمنع الخطأ
          pip install flet-flashlight flet-permission-handler --no-deps
          
      - name: Build APK
        run: |
          # تأكد من أن اسم الملف هو app.py كما في مشروعك
          flet build apk --main app.py
          
      - uses: actions/upload-artifact@v4
        with:
          name: Flash-Success
          path: "build/apk/*.apk"
