name: Build Flet Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          cache: true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-cli

      - name: Build APK
        run: |
          # أمر البناء البسيط والمباشر
          yes | flet build apk --module-name app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Flashlight-App-Clean
          path: "**/*.apk"
