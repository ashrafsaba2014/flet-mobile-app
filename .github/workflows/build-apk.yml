name: Build Flet Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # ✅ محدث لـ Node.js 24

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          cache: true

      - name: Install Flet + Extensions
        run: |
          pip install flet flet-cli flet-flashlight flet-permission-handler

      - name: Build APK
        run: flet build apk --module-name app

      - name: Find APK
        run: find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4  # ✅ محدث لـ Node.js 24
        with:
          name: app-release
          path: build/**/*.apk
