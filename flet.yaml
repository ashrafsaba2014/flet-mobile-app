app:
  name: "Ashraf Flash Light"
  package: "com.ashraf.flashlight"

build:
  android:
    permissions:
      - CAMERA
    # ✅ التعديل هنا: استخدم "packages" بدلاً من "dependencies" لضمان الدمج
    packages:
      - flet_flashlight
      - flet_permission_handler

# الاعتماديات العامة لمكتبة بايثون
dependencies:
  - flet-flashlight
  - flet-permission-handler
