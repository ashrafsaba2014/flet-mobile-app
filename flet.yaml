# ═══════════════════════════════════════════════════════════════
# 📱 ملف إعدادات بناء تطبيق أندرويد باستخدام Flet CLI
# 📍 ضعه في نفس مجلد ملف البايثون الرئيسي (app.py)
# ═══════════════════════════════════════════════════════════════

app:
  name: "Ashraf Helmy App"          # 📌 الاسم الداخلي للتطبيق
  title: "Ashraf Helmy"             # 📌 العنوان الذي يظهر تحت الأيقونة على الشاشة
  description: "تطبيق تجريبي باستخدام Flet"  # 📝 وصف التطبيق
  version: "1.0.0"                  # 🔢 إصدار التطبيق (يظهر للمستخدم)
  package: "com.ashraf.helmyapp"    # 📦 اسم الحزمة الفريد (يجب أن يكون بترتيب عكسي مثل دومين)

build:
  android:
    compile_sdk_version: 34         # ⚙️ إصدار SDK المستخدم في التجميع
    min_sdk_version: 21             # 📱 أقل إصدار أندرويد مدعوم (Android 5.0)
    target_sdk_version: 34          # 🎯 الإصدار المستهدف (مطابق لـ compile)
    version_code: 1                 # 🔢 رقم الإصدار الداخلي (يجب زيادته عند كل رفع لـ Google Play)
    
    # 🔓 الأذونات المطلوبة (أضف أو احذف حسب احتياجك)
    permissions:
      - INTERNET                    # ✅ ضروري لأي اتصال بالشبكة أو تحميل خطوط
      # - ACCESS_FINE_LOCATION      # 📍 الموقع الدقيق
      # - CAMERA                    # 📷 الكاميرا
      # - READ_EXTERNAL_STORAGE     # 📂 قراءة التخزين (لأندرويد < 13)
    
    # 🎨 موارد الواجهة (اختياري لكن مُنصح بشدة)
    icon: "assets/icon.png"         # 🖼️ أيقونة التطبيق (512x512 PNG شفاف الخلفية)
    # splash: "assets/splash.png"   # 🌅 شاشة البداية (اختياري، يُنصح بحجم 1080x1920)